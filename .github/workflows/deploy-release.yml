name: Deploy Release

on:
  push:
    tags:
      - "*"

env:
  # NOTE: Stick to this node version because of the bug https://github.com/nodejs/node/issues/62425
  NODE_VERSION: 22.22.1

jobs:
  validate-tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_exists: ${{ steps.validate_release.outputs.release_exists }}
      tag_name: ${{ steps.validate_release.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Validate GitHub release exists
        id: validate_release
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Check if a GitHub release exists for this tag
          # gh release view returns release info if exists, or error message if not
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "✅ GitHub release found for tag $TAG_NAME"
            echo "release_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Warning: Tag $TAG_NAME pushed but no corresponding GitHub release found."
            echo "⚠️  Skipping deployment. Tags should be created via create-release.yml workflow."
            echo "release_exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-release-type:
    needs: [validate-tag-release]
    if: needs.validate-tag-release.outputs.release_exists == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_uat: ${{ steps.detect.outputs.is_uat }}
      is_prd: ${{ steps.detect.outputs.is_prd }}
      tag_name: ${{ steps.detect.outputs.tag_name }}
      version: ${{ steps.detect.outputs.version }}
      environment: ${{ steps.detect.outputs.environment }}
      registry_url: ${{ steps.detect.outputs.registry_url }}
      npm_scope: ${{ steps.detect.outputs.npm_scope }}
      subscription_id: ${{ steps.detect.outputs.subscription_id }}
      storage_account_name: ${{ steps.detect.outputs.storage_account_name }}
      update_global_latest: ${{ steps.global_latest.outputs.update_global_latest }}
    steps:
      - name: Detect release type
        id: detect
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Check if tag contains -rc (UAT) or is a clean semver (PRD)
          # Use bash pattern matching like in create-release.yml
          if [[ "$TAG_NAME" == *"-rc."* ]]; then
            echo "is_uat=true" >> $GITHUB_OUTPUT
            echo "is_prd=false" >> $GITHUB_OUTPUT
            echo "environment=uat" >> $GITHUB_OUTPUT
            echo "registry_url=https://npm.pkg.github.com" >> $GITHUB_OUTPUT
            echo "npm_scope=@chili-publish" >> $GITHUB_OUTPUT
            echo "subscription_id=${{ vars.AZ_SUBSCRIPTION_ID_SAAS_UAT }}" >> $GITHUB_OUTPUT
            echo "storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME_UAT }}" >> $GITHUB_OUTPUT
            echo "Detected UAT release: $TAG_NAME"
          elif [[ "$TAG_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_uat=false" >> $GITHUB_OUTPUT
            echo "is_prd=true" >> $GITHUB_OUTPUT
            echo "environment=prd" >> $GITHUB_OUTPUT
            echo "registry_url=https://registry.npmjs.org" >> $GITHUB_OUTPUT
            echo "npm_scope=" >> $GITHUB_OUTPUT
            echo "subscription_id=${{ vars.AZ_SUBSCRIPTION_ID_GRAFX_PRD }}" >> $GITHUB_OUTPUT
            echo "storage_account_name=${{ vars.STORAGE_ACCOUNT_NAME_PROD }}" >> $GITHUB_OUTPUT
            echo "Detected PRD release: $TAG_NAME"
          else
            echo "❌ Error: Tag format not recognized. Expected format: X.Y.Z (PRD) or X.Y.Z-rc.N (UAT)"
            exit 1
          fi

          # Extract version from tag (remove v prefix if present)
          VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute global latest for CDN / main bump
        id: global_latest
        run: |
          if [ "${{ steps.detect.outputs.is_prd }}" != "true" ]; then
            # UAT: set global upload/latest only when this UAT's base semver (tag without -rc) is >=
            # GitHub latest stable (gh release view). If UAT base < latest, treat as old-line: skip
            # upload/latest only; versioned path still updates.
            TAG_NAME=${GITHUB_REF#refs/tags/}
            VER="${TAG_NAME#v}"
            UAT_BASE="${VER%%-rc*}"
            if ! echo "$UAT_BASE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "update_global_latest=true" >> $GITHUB_OUTPUT
              echo "UAT: could not parse base semver from $TAG_NAME; defaulting to update global upload/latest"
              exit 0
            fi
            LATEST_STABLE_TAG=$(gh release view --json tagName -q .tagName 2>/dev/null || true)
            CLEANED=$(printf '%s\n' "$LATEST_STABLE_TAG" | sed 's/^v//')
            LATEST=""
            if [ -n "$CLEANED" ] && echo "$CLEANED" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              LATEST=$CLEANED
            fi
            if [ -z "$LATEST" ]; then
              echo "update_global_latest=true" >> $GITHUB_OUTPUT
              echo "UAT: no valid GitHub latest stable; defaulting to update global upload/latest"
              exit 0
            fi
            MIN_VER=$(printf '%s\n' "$UAT_BASE" "$LATEST" | sort -V | head -1)
            if [ "$MIN_VER" = "$UAT_BASE" ] && [ "$UAT_BASE" != "$LATEST" ]; then
              echo "update_global_latest=false" >> $GITHUB_OUTPUT
              echo "UAT: $UAT_BASE < latest stable $LATEST; skipping only upload/latest (versioned path still updated)"
            else
              echo "update_global_latest=true" >> $GITHUB_OUTPUT
              echo "UAT: $UAT_BASE >= or same line as latest $LATEST; updating global upload/latest"
            fi
            exit 0
          fi

          VERSION="${{ steps.detect.outputs.version }}"
          # GitHub "latest" full release (marked as latest, not UAT not old-line)
          LATEST_TAG=$(gh release view --json tagName -q .tagName 2>/dev/null || true)
          CLEANED=$(printf '%s\n' "$LATEST_TAG" | sed 's/^v//')
          HIGHEST=""
          if [ -n "$CLEANED" ] && echo "$CLEANED" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            HIGHEST=$CLEANED
          fi

          if [ -z "$HIGHEST" ]; then
            echo "update_global_latest=true" >> $GITHUB_OUTPUT
            echo "No valid semver for GitHub latest release; updating upload/latest"
            exit 0
          fi

          if [ "$VERSION" = "$HIGHEST" ]; then
            echo "update_global_latest=true" >> $GITHUB_OUTPUT
            echo "PRD tag $VERSION is GitHub latest; will update upload/latest and allow main bump"
          else
            echo "update_global_latest=false" >> $GITHUB_OUTPUT
            echo "PRD tag $VERSION is not GitHub latest ($HIGHEST); skipping global upload/latest and main bump"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  preflight:
    needs: [validate-tag-release]
    if: needs.validate-tag-release.outputs.release_exists == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Check cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/sdk/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}-0
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://npm.pkg.github.com"
          scope: "@chili-publish"

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run linting
        run: yarn ci-lint

      - name: Run tests
        run: yarn cover

  publish:
    needs: [validate-tag-release, detect-release-type, preflight]
    if: needs.validate-tag-release.outputs.release_exists == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-release-type.outputs.environment }}
    permissions:
      contents: read
      id-token: write # Required for OIDC
      packages: write # Required for GitHub Packages npm publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-release-type.outputs.tag_name }}

      - name: Check cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/sdk/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}-0
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ needs.detect-release-type.outputs.registry_url }}
          scope: ${{ needs.detect-release-type.outputs.npm_scope }}

      - name: Update to latest npm version
        if: needs.detect-release-type.outputs.is_prd == 'true'
        run: npm i -g npm@11.13.0
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ needs.detect-release-type.outputs.is_uat == 'true' && secrets.GITHUB_TOKEN || '' }}

      - name: Build code
        run: yarn build
        env:
          ENGINE_DOMAIN: ${{ vars.ENGINE_DOMAIN }}

      - name: Publish SDK to GitHub Packages (UAT)
        if: needs.detect-release-type.outputs.is_uat == 'true'
        working-directory: packages/sdk
        run: |
          node -p "require('./package.json').name + ' ' + require('./package.json').version"
          npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Connectors to GitHub Packages (UAT)
        if: needs.detect-release-type.outputs.is_uat == 'true'
        working-directory: packages/connectors
        run: |
          node -p "require('./package.json').name + ' ' + require('./package.json').version"
          npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish SDK to NPM (PRD OIDC)
        if: needs.detect-release-type.outputs.is_prd == 'true'
        working-directory: packages/sdk
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          node -p "require('./package.json').name + ' ' + require('./package.json').version"
          npm publish --access public --tag latest

      - name: Publish Connectors to NPM (PRD OIDC)
        if: needs.detect-release-type.outputs.is_prd == 'true'
        working-directory: packages/connectors
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          node -p "require('./package.json').name + ' ' + require('./package.json').version"
          npm publish --access public --tag latest

  deploy-azure:
    needs: [validate-tag-release, detect-release-type, preflight]
    if: needs.validate-tag-release.outputs.release_exists == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-release-type.outputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-release-type.outputs.tag_name }}

      - name: Check cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/sdk/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}-0
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ needs.detect-release-type.outputs.registry_url }}
          scope: ${{ needs.detect-release-type.outputs.npm_scope }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ needs.detect-release-type.outputs.is_uat == 'true' && secrets.GITHUB_TOKEN || '' }}

      - name: Build code
        run: yarn build
        env:
          ENGINE_DOMAIN: ${{ vars.ENGINE_DOMAIN }}

      - name: Prepare CDN upload (UAT)
        if: needs.detect-release-type.outputs.is_uat == 'true'
        env:
          UPDATE_GLOBAL_LATEST: ${{ needs.detect-release-type.outputs.update_global_latest }}
        run: |
          path=packages/sdk/upload/latest
          versionpath=packages/sdk/upload/${{ needs.detect-release-type.outputs.version }}
          if [ "$UPDATE_GLOBAL_LATEST" = "true" ]; then
            mkdir -p ${path%"/merge"}
            cp -R packages/sdk/_bundles/* ${path%"/merge"}
          else
            echo "Skipping global packages/sdk/upload/latest (UAT: old release line; versioned path still updated)"
          fi
          mkdir -p ${versionpath%"/merge"}
          cp -R packages/sdk/_bundles/* ${versionpath%"/merge"}

      - name: Prepare CDN upload (PRD)
        if: needs.detect-release-type.outputs.is_prd == 'true'
        env:
          RELEASE_NAME: ${{ needs.detect-release-type.outputs.version }}
          UPDATE_GLOBAL_LATEST: ${{ needs.detect-release-type.outputs.update_global_latest }}
        run: |
          path=packages/sdk/upload/latest
          minorversion=$(echo $RELEASE_NAME | grep -o "^[0-9]\+\.[0-9]\+")
          patchversion=$(echo $RELEASE_NAME | grep -o "^[0-9]\+\.[0-9]\+\.[0-9]\+" | cut -d. -f3)
          minorlatestpath=packages/sdk/upload/$minorversion/latest
          patchlatestpath=packages/sdk/upload/$minorversion/$patchversion/latest
          if [ "$UPDATE_GLOBAL_LATEST" = "true" ]; then
            mkdir -p ${path%"/merge"}
            cp -R packages/sdk/_bundles/* ${path%"/merge"}
          else
            echo "Skipping global packages/sdk/upload/latest (not GitHub latest PRD)"
          fi
          mkdir -p ${minorlatestpath%"/merge"}
          cp -R packages/sdk/_bundles/* ${minorlatestpath%"/merge"}
          mkdir -p ${patchlatestpath%"/merge"}
          cp -R packages/sdk/_bundles/* ${patchlatestpath%"/merge"}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId": "${{ vars.AZ_AD_CLIENT_ID_CP_RJS_INT_CICD_SP }}",
              "clientSecret": "${{ secrets.AZ_AD_CLIENT_SECRET_CP_RJS_INT_CICD_SP }}",
              "tenantId": "${{ vars.AZ_TENANT_ID }}",
              "subscriptionId": "${{ needs.detect-release-type.outputs.subscription_id }}"
            }

      - name: Copy SDK to Azure Blob Storage
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name "${{ needs.detect-release-type.outputs.storage_account_name }}" \
              --destination sdk \
              --source packages/sdk/upload/ \
              --overwrite true \
              --auth-mode login

      - name: Prepare for actions upload
        run: |
          node cicd.js actions node scripts/prepare-release.mjs

      - name: Copy Actions to Azure Blob Storage
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name "${{ needs.detect-release-type.outputs.storage_account_name }}" \
              --destination sdk \
              --source packages/actions/cdn/ \
              --overwrite true \
              --auth-mode login

  publish-docs:
    needs: [validate-tag-release, detect-release-type, preflight]
    if: needs.validate-tag-release.outputs.release_exists == 'true' && needs.detect-release-type.outputs.is_prd == 'true'
    uses: ./.github/workflows/publish-docs.yml
    with:
      release_commit_sha: ${{ needs.detect-release-type.outputs.tag_name }}
    permissions:
      contents: read
      pages: write
      id-token: write
      packages: read

  purge-cdn:
    needs: [validate-tag-release, detect-release-type, deploy-azure]
    if: needs.validate-tag-release.outputs.release_exists == 'true'
    name: Cloudflare CDN purge
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App Access Token
        id: github-app-access-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID_CHILI_FRONTEND_VERSION_MANAGER }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY_CHILI_FRONTEND_VERSION_MANAGER }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch Cloudflare CDN Purge Action
        id: dispatch-cloudflare-cdn-purge
        run: |
          curl -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ steps.github-app-access-token.outputs.token }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/chili-publish/delivery-infrastructure/actions/workflows/ops-cloudflare-cdn-purge.yml/dispatches \
          -d '{"ref":"main","inputs":{"destination":"${{ needs.detect-release-type.outputs.is_prd == 'true' && 'PRD' || 'UAT' }}","purge-prefixes":"sdk"}}'

  notify:
    needs: [validate-tag-release, detect-release-type, publish, deploy-azure]
    if: needs.validate-tag-release.outputs.release_exists == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Notify Teams
        run: |
          VERSION="${{ needs.detect-release-type.outputs.version }}"
          TAG_NAME="${{ needs.detect-release-type.outputs.tag_name }}"
          RELEASE_TYPE="${{ needs.detect-release-type.outputs.is_uat == 'true' && 'UAT' || 'Production' }}"
          EMOJI="${{ needs.detect-release-type.outputs.is_uat == 'true' && '🧪' || '🎉' }}"

          payload=$(cat <<EOF
          {
              "text": "$EMOJI **$RELEASE_TYPE Deployment Completed**\n\n**Version:** $VERSION\n**Tag:** $TAG_NAME\n\nDeployment to $RELEASE_TYPE environment completed successfully."
          }
          EOF
          )
          curl --request POST \
          --header "Content-Type: application/json" \
          --data "$payload" \
          "${{ secrets.TEAMS_RELEASE_HOOK_URL }}"

  bump-main-version:
    needs: [validate-tag-release, detect-release-type, publish, deploy-azure]
    if: needs.validate-tag-release.outputs.release_exists == 'true' && needs.detect-release-type.outputs.is_prd == 'true' && needs.detect-release-type.outputs.update_global_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Get GitHub App Access Token
        id: github-app-access-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID_CHILI_FRONTEND_VERSION_MANAGER }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY_CHILI_FRONTEND_VERSION_MANAGER }}
          owner: ${{ github.repository_owner }}

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.github-app-access-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/sdk/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}-0
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check if hotfix release
        id: check_hotfix
        run: |
          CURRENT_TAG="${{ needs.detect-release-type.outputs.version }}"

          # Get previous production release (skip the current release)
          # Get all production releases and filter out the current tag, then take the first one
          PREVIOUS_TAG=$(gh release list --limit 10 --json isPrerelease,tagName --jq ".[] | select(.isPrerelease == false) | select(.tagName != \"$CURRENT_TAG\") | .tagName" | head -1)

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "is_hotfix=false" >> $GITHUB_OUTPUT
            echo "No previous release found, assuming regular release"
            exit 0
          fi

          # Extract major.minor from both versions
          CURRENT_MINOR=$(echo "$CURRENT_TAG" | cut -d. -f1,2)
          PREVIOUS_MINOR=$(echo "$PREVIOUS_TAG" | cut -d. -f1,2)

          # If minor version is the same, it's a hotfix (patch increment)
          if [ "$CURRENT_MINOR" = "$PREVIOUS_MINOR" ]; then
            echo "is_hotfix=true" >> $GITHUB_OUTPUT
            echo "Detected hotfix release (minor version unchanged: $CURRENT_MINOR)"
          else
            echo "is_hotfix=false" >> $GITHUB_OUTPUT
            echo "Detected regular release (minor version changed: $PREVIOUS_MINOR -> $CURRENT_MINOR)"
          fi

      - name: Get current version
        id: current_version
        if: steps.check_hotfix.outputs.is_hotfix != 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version in main: $VERSION"

      - name: Bump to next minor alpha
        if: steps.check_hotfix.outputs.is_hotfix != 'true'
        id: bump_version
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Calculate next minor version with alpha.0 (only for regular production releases)
          NEW_VERSION=$(npm version preminor --preid=alpha --git-tag-version=false)

          # Remove 'v' prefix if present
          NEXT_VERSION=$(echo $NEW_VERSION | sed 's/^v//')

          echo "new_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version to: $NEXT_VERSION"

      - name: Execute replicate version script
        if: steps.check_hotfix.outputs.is_hotfix != 'true'
        run: node ./.github/scripts/replicate-version.js

      - name: Update engine version from release
        if: steps.check_hotfix.outputs.is_hotfix != 'true'
        run: |
          TAG_NAME="${{ needs.detect-release-type.outputs.tag_name }}"
          ENGINE_JSON="packages/sdk/editor-engine.json"

          # Read engine version from the released tag
          ENGINE_VERSION=$(git show "${TAG_NAME}:${ENGINE_JSON}" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).current")

          echo "Engine version from release tag: $ENGINE_VERSION"

          # Update editor-engine.json on main
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('$ENGINE_JSON', 'utf8'));
            data.current = '$ENGINE_VERSION';
            fs.writeFileSync('$ENGINE_JSON', JSON.stringify(data, null, 4));
          "

      - name: Commit and push version bump
        if: steps.check_hotfix.outputs.is_hotfix != 'true'
        run: |
          git add package.json yarn.lock || true
          git add packages/*/package.json packages/*/yarn.lock || true
          git add packages/sdk/editor-engine.json || true
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }} for next dev cycle [skip ci]"
          git push origin main
          echo "Pushed version bump to main branch"
